<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Asset Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
    }
    .logo-wrap {
      width: 72px; height: 72px;
      background: #0d2044;
      border: 1px solid rgba(88,166,255,.2);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      animation: pulse 2.4s ease-in-out infinite;
      padding: 10px;
    }
    .logo-wrap svg { width: 100%; height: 100%; }
    h1 {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -.3px;
      color: #e6edf3;
      margin-bottom: 4px;
    }
    .sub {
      font-size: 11px;
      color: #484f58;
      margin-bottom: 40px;
      letter-spacing: .6px;
      text-transform: uppercase;
    }
    .spinner {
      width: 26px; height: 26px;
      border: 2.5px solid rgba(255,255,255,.07);
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin-bottom: 12px;
    }
    .status {
      font-size: 11px;
      color: #484f58;
      min-height: 16px;
      letter-spacing: .2px;
    }
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(88,166,255,0); } 50% { box-shadow: 0 0 0 10px rgba(88,166,255,.07); } }
  </style>
</head>
