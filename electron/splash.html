<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Asset Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
    }
    .icon-wrap {
      width: 56px; height: 56px;
      background: #0d2044;
      border: 1px solid rgba(88,166,255,.25);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
      animation: pulse 2.4s ease-in-out infinite;
    }
    .icon-wrap span {
      font-family: 'Material Icons Round';
      font-size: 30px;
      color: #58a6ff;
      font-style: normal;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.3px;
      color: #e6edf3;
      margin-bottom: 4px;
    }
    .sub {
      font-size: 12px;
      color: #484f58;
      margin-bottom: 40px;
      letter-spacing: .4px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid rgba(255,255,255,.08);
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin-bottom: 14px;
    }
    .status {
      font-size: 11px;
      color: #484f58;
      min-height: 16px;
      letter-spacing: .2px;
    }
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(88,166,255,.0); } 50% { box-shadow: 0 0 0 8px rgba(88,166,255,.08); } }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>
  <div class="icon-wrap"><span>inventory_2</span></div>
  <h1>Asset Manager</h1>
  <p class="sub">GRAVITY BP</p>
  <div class="spinner"></div>
  <p class="status" id="status">Starting…</p>
</body>
</html>
